<script>
// ════════════════════════════
//  CONFIG
// ════════════════════════════
const REPO_OWNER = 'Nao1222';
const REPO_NAME  = 'Fight-the-BRAINROT-Tracker';
const FILE_PATH  = 'data.json';
const BRANCH     = 'main';
const PW_HASH    = '4428f0d2695d5fc8c50097e3d77787788d8bddb515c23591fc9bc51efcd35fa0';
// ════════════════════════════
const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
const RAW_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${FILE_PATH}`;
let players   = [];
let fileSha   = '';
let sort      = 'power';
let admin     = false;
let ghToken   = '';
let prevRanks = {};
let filter    = { id: '', powMin: '', powMax: '' };
// ── SHA-256 ──
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
}
// ── GITHUB API ──
async function ghFetch(method, body) {
  const opts = {
    method,
    headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github.v3+json' }
  };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  return fetch(API_URL, opts);
}
// ── LOAD ──
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('empty').style.display   = 'none';
  document.getElementById('tbody').innerHTML        = '';
  try {
    let data;
    if (ghToken) {
      // 管理者ログイン中 → Contents API（認証付き・キャッシュなし・常に最新）
      const res = await ghFetch('GET');
      if (!res.ok) throw new Error('API ' + res.status);
      const file = await res.json();
      const decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
      data    = JSON.parse(decoded);
      fileSha = file.sha;
    } else {
      // 未ログイン → raw URL（公開読み取り）
      const res = await fetch(RAW_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('raw ' + res.status);
      data = await res.json();
    }
    players = data.players || [];
    document.getElementById('syncLabel').textContent =
      data.updated ? new Date(data.updated).toLocaleString('ja-JP') : 'GitHub 同期';
    document.getElementById('dotLive').style.background = '#22c55e';
  } catch(e) {
    players = [];
    document.getElementById('syncLabel').textContent = 'エラー: ' + e.message;
    document.getElementById('dotLive').style.background = '#e05555';
  }
  document.getElementById('loading').style.display = 'none';
  render();
}
// ── SAVE ──
async function saveData(commitMsg) {
  const sb = document.getElementById('saveBtn');
  if (sb) { sb.disabled = true; sb.textContent = '保存中…'; }
  const payload = { players, updated: new Date().toISOString() };
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
  // fileSha が空の場合だけ取り直す（通常はloadData()で取得済み）
  if (!fileSha) {
    try {
      const info = await ghFetch('GET');
      if (info.ok) fileSha = (await info.json()).sha;
    } catch {}
  }
  const res = await ghFetch('PUT', {
    message: commitMsg,
    content,
    branch: BRANCH,
    ...(fileSha ? { sha: fileSha } : {})
  });
  if (sb) { sb.disabled = false; sb.textContent = '保存'; }
  if (res.ok) {
    fileSha = (await res.json()).content.sha;
    document.getElementById('syncLabel').textContent = new Date().toLocaleString('ja-JP');
    toast('✔ ' + commitMsg, true);
  } else {
    toast('⚠ 保存に失敗しました', false);
  }
}
// ── AUTH ──
async function doLogin() {
  const h = await sha256(document.getElementById('pwIn').value);
  if (h !== PW_HASH) {
    document.getElementById('pwErr').classList.remove('hidden');
    document.getElementById('pwIn').value = '';
    document.getElementById('pwIn').focus();
    return;
  }
  ghToken = document.getElementById('tokIn').value.trim();
  admin   = true;
  closeModal('loginModal');
  document.getElementById('abadge').classList.remove('hidden');
  document.getElementById('loginBtn').style.display  = 'none';
  document.getElementById('logoutBtn').style.display = '';
  document.getElementById('addBtn').style.display    = '';
  document.getElementById('gridHead').style.gridTemplateColumns = '72px 1fr 160px 140px 160px 130px';
  document.getElementById('gridHead').innerHTML = '<div class="text-center">ランク</div><div>ID</div><div>Discord</div><div class="text-right" id="thPow">⚡ 戦力</div><div class="text-right" id="thKil">💀 総撃破数</div><div class="text-center">操作</div>';
  render();
  toast('ログイン成功', true);
}
function doLogout() {
  admin = false; ghToken = '';
  document.getElementById('abadge').classList.add('hidden');
  document.getElementById('loginBtn').style.display  = '';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('addBtn').style.display    = 'none';
  document.getElementById('gridHead').style.gridTemplateColumns = '72px 1fr 160px 140px 160px';
  document.getElementById('gridHead').innerHTML = '<div class="text-center">ランク</div><div>ID</div><div>Discord</div><div class="text-right" id="thPow">⚡ 戦力</div><div class="text-right" id="thKil">💀 総撃破数</div>';
  render();
  toast('ログアウトしました', false);
}
// ── SORT ──
function setSort(s) {
  sort = s;
  document.getElementById('tabPow').classList.toggle('active-tab', s==='power');
  document.getElementById('tabPow').classList.toggle('tab-btn',    true);
  document.getElementById('tabKil').classList.toggle('active-tab', s==='kills');
  document.getElementById('tabKil').classList.toggle('tab-btn',    true);
  render();
}
function sorted() {
  return [...players].sort((a,b) => sort==='power' ? b.power-a.power : b.kills-a.kills);
}
function filtered(list) {
  return list.filter(p => {
    const q      = filter.id.toLowerCase();
    const idOk   = !q || p.id.toLowerCase().includes(q) || (p.discord||'').toLowerCase().includes(q);
    const minOk  = filter.powMin === '' || p.power >= Number(filter.powMin);
    const maxOk  = filter.powMax === '' || p.power <= Number(filter.powMax);
    return idOk && minOk && maxOk;
  });
}
function applyFilter() {
  filter.id     = document.getElementById('searchId').value.trim();
  filter.powMin = document.getElementById('searchPowMin').value;
  filter.powMax = document.getElementById('searchPowMax').value;
  const active  = filter.id !== '' || filter.powMin !== '' || filter.powMax !== '';
  document.getElementById('clearBtn').style.display = active ? '' : 'none';
  render();
}
function clearFilter() {
  document.getElementById('searchId').value     = '';
  document.getElementById('searchPowMin').value = '';
  document.getElementById('searchPowMax').value = '';
  filter = { id: '', powMin: '', powMax: '' };
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('hitCount').classList.add('hidden');
  render();
}
// ── COUNT-UP ──
function countUp(el, target) {
  const steps = 30, dur = 560;
  let i = 0;
  const iv = setInterval(() => {
    i++;
    el.textContent = Math.round(target * (i/steps)).toLocaleString();
    if (i >= steps) { clearInterval(iv); el.textContent = target.toLocaleString(); }
  }, dur/steps);
}
// ── RENDER ──
function render() {
  const list  = filtered(sorted());
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  document.getElementById('cnt').textContent = players.length;
  // hit count 表示
  const isFiltering = filter.id !== '' || filter.powMin !== '' || filter.powMax !== '';
  const hitEl = document.getElementById('hitCount');
  if (isFiltering) {
    hitEl.classList.remove('hidden');
    document.getElementById('hitNum').textContent = list.length;
  } else {
    hitEl.classList.add('hidden');
  }
  if (!list.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    empty.style.display = 'flex';
    return;
  }
  empty.classList.add('hidden');
  empty.style.display = 'none';
  const newRanks = {};
  list.forEach((p,i) => newRanks[p.id] = i+1);
  tbody.innerHTML = '';
  const cols = admin
    ? '72px 1fr 160px 140px 160px 130px'
    : '72px 1fr 160px 140px 160px';
  list.forEach((p, i) => {
    const rank    = i + 1;
    const rCls    = rank===1?'rank-gold':rank===2?'rank-silver':rank===3?'rank-bronze':'rank-other';
    const rLabel  = rank<=3 ? ['🥇','🥈','🥉'][rank-1] : String(rank).padStart(2,'0');
    const origIdx = players.indexOf(p);
    const changed = prevRanks[p.id] !== undefined && prevRanks[p.id] !== rank;
    const row = document.createElement('div');
    row.className = 'border-b border-surface-var/60 row-anim group';
    row.style.animationDelay = (i * 28) + 'ms';
    if (changed) setTimeout(() => row.classList.add('row-flash'), 10);
    const powHi = sort==='power' ? 'text-red-accent' : 'text-on-surface';
    const kilHi = sort==='kills' ? 'text-red-accent' : 'text-on-surface';
    const discordSvg = `<svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" style="color:#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`;
    const discordHtml = p.discord
      ? `<div class="flex items-center gap-1.5">${discordSvg}<span class="font-grotesk text-sm text-on-surface/80 truncate">${esc(p.discord)}</span></div>`
      : `<span class="text-on-muted text-xs">—</span>`;
    const adminBtns = admin ? `
      <div class="flex justify-end sm:justify-center gap-2">
        <button onclick="openEdit(${origIdx})"
          class="font-grotesk font-bold text-xs tracking-wider uppercase text-[#4a90c4] border border-[#1a3550] hover:border-[#4a90c4] hover:bg-[#4a90c4]/10 px-2.5 py-1.5 transition-all clipped-sm">
          編集
        </button>
        <button onclick="delEntry(${origIdx})"
          class="font-grotesk font-bold text-xs tracking-wider uppercase text-red-400/80 border border-red-900/40 hover:border-red-500 hover:bg-red-500/10 px-2.5 py-1.5 transition-all clipped-sm">
          削除
        </button>
      </div>` : '';
    row.innerHTML = `
      <!-- Mobile card (sm未満) -->
      <div class="sm:hidden px-4 py-3 hover:bg-surface-var/30 transition-colors">
        <div class="flex items-center gap-3 mb-1.5">
          <span class="rank-num font-grotesk font-black text-sm w-9 h-9 flex-shrink-0 flex items-center justify-center clipped-sm ${rCls} ${changed?'pop-badge':''}">
            ${rLabel}
          </span>
          <div class="flex-1 min-w-0">
            <div class="font-grotesk font-bold text-sm text-on-surface tracking-wide truncate">${esc(p.id)}</div>
            <div class="overflow-hidden mt-0.5">${discordHtml}</div>
          </div>
          <div class="text-right flex-shrink-0">
            <div class="text-on-muted text-[10px] font-grotesk uppercase tracking-wider">⚡ 戦力</div>
            <div class="font-grotesk font-black text-base ${powHi}" data-pow="${p.power}"></div>
          </div>
        </div>
        <div class="flex items-center justify-between pl-12">
          <span class="font-grotesk text-xs text-on-muted">💀 撃破数</span>
          <div class="font-grotesk font-black text-sm ${kilHi}" data-kil="${p.kills}"></div>
        </div>
        ${admin ? `<div class="mt-2">${adminBtns}</div>` : ''}
      </div>
      <!-- Desktop grid (sm以上) -->
      <div class="hidden sm:grid gap-4 px-5 py-4 items-center hover:bg-surface-var/30 transition-colors" style="grid-template-columns:${cols}">
        <div class="flex justify-center">
          <span class="rank-num font-grotesk font-black text-sm w-9 h-9 flex items-center justify-center clipped-sm ${rCls} ${changed?'pop-badge':''}">
            ${rLabel}
          </span>
        </div>
        <div>
          <div class="font-grotesk font-bold text-sm text-on-surface tracking-wide">${esc(p.id)}</div>
        </div>
        <div class="overflow-hidden">${discordHtml}</div>
        <div class="text-right font-grotesk font-black text-base ${powHi}" data-pow="${p.power}"></div>
        <div class="text-right font-grotesk font-black text-base ${kilHi}" data-kil="${p.kills}"></div>
        ${admin ? adminBtns : ''}
      </div>
    `;
    tbody.appendChild(row);
    row.querySelectorAll('[data-pow]').forEach(el => countUp(el, p.power));
    row.querySelectorAll('[data-kil]').forEach(el => countUp(el, p.kills));
  });
  prevRanks = newRanks;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// ── CRUD ──
async function saveEntry() {
  const id      = document.getElementById('eId').value.trim();
  const discord = document.getElementById('eDiscord').value.trim();
  const pow     = parseInt(document.getElementById('ePow').value);
  const kil     = parseInt(document.getElementById('eKil').value);
  const idx     = parseInt(document.getElementById('eIdx').value);
  if (!id || isNaN(pow) || isNaN(kil)) {
    document.getElementById('eErr').classList.remove('hidden');
    return;
  }
  document.getElementById('eErr').classList.add('hidden');
  const msg = idx === -1 ? `add: ${id}` : `update: ${id}`;
  if (idx === -1) players.push({id, discord, power:pow, kills:kil});
  else            players[idx] = {id, discord, power:pow, kills:kil};
  render();
  closeModal('entryModal');
  await saveData(msg);
}
async function delEntry(idx) {
  if (!confirm(`「${players[idx].id}」を削除しますか？`)) return;
  const name = players[idx].id;
  players.splice(idx, 1);
  render();
  await saveData(`delete: ${name}`);
}
// ── MODALS ──
function togglePw() {
  const inp = document.getElementById('pwIn');
  const eye = document.getElementById('pwEye');
  const show = inp.type === 'password';
  inp.type  = show ? 'text' : 'password';
  eye.textContent = show ? 'visibility_off' : 'visibility';
}
function openLogin() {
  document.getElementById('pwIn').value  = '';
  document.getElementById('pwIn').type   = 'password';
  document.getElementById('pwEye').textContent = 'visibility';
  document.getElementById('tokIn').value = '';
  document.getElementById('pwErr').classList.add('hidden');
  showModal('loginModal');
  setTimeout(() => document.getElementById('pwIn').focus(), 80);
}
function openAdd() {
  document.getElementById('eTitle').textContent = '新規登録';
  document.getElementById('eIdx').value = '-1';
  ['eId','eDiscord','ePow','eKil'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('eErr').classList.add('hidden');
  showModal('entryModal');
  setTimeout(() => document.getElementById('eId').focus(), 80);
}
function openEdit(idx) {
  const p = players[idx];
  document.getElementById('eTitle').textContent = '編集';
  document.getElementById('eIdx').value     = idx;
  document.getElementById('eId').value      = p.id;
  document.getElementById('eDiscord').value = p.discord || '';
  document.getElementById('ePow').value     = p.power;
  document.getElementById('eKil').value     = p.kills;
  document.getElementById('eErr').classList.add('hidden');
  showModal('entryModal');
}
function showModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('#loginModal, #entryModal').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden'); });
});
// ── REFRESH ──
async function manualRefresh() {
  const btn  = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.classList.add('spin-icon');
  await loadData();
  icon.classList.remove('spin-icon');
  btn.disabled = false;
  toast('同期しました', true);
}
// ── TOAST ──
let tid;
function toast(msg, ok) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderLeftColor = ok ? '#22cc66' : '#e05555';
  el.style.transform = 'translateY(0)';
  el.style.opacity   = '1';
  clearTimeout(tid);
  tid = setTimeout(() => {
    el.style.transform = 'translateY(60px)';
    el.style.opacity   = '0';
  }, 2800);
}
